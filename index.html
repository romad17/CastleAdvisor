<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastleAdvisor - Austria</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Ensures the map fills the entire mobile or desktop screen */
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map centered on Austria
        const map = L.map('map').setView([47.5162, 14.5501], 7);

        // 2. Add OpenStreetMap tile layer (the basemap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Load your Austria castle data
        // Make sure your file is named 'austria.geojson' in the same repo folder
        fetch('austria.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        // Extract OSM tags for the popup
                        const name = feature.properties.name || "Unknown Castle";
                        const status = feature.properties.condition || "Not specified";
                        const year = feature.properties.start_date || "Unknown";
                        
                        // Create the popup content
                        layer.bindPopup(`
                            <strong>${name}</strong><br>
                            <b>Status:</b> ${status}<br>
                            <b>Year Built:</b> ${year}
                        `);
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error loading the GeoJSON:', error));
    </script>
</body>
</html>
